# .github/workflows/ci.yml
# Repo : EazyVTC_Mobile
name: CI — EazyVTC Mobile (Expo)

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test-mobile:
    name: Mobile Expo — TypeScript + Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test
        env:
          EXPO_PUBLIC_API_URL: http://localhost:4000
